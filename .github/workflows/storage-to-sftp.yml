name: Supabase Storage to SFTP Sync

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync-to-sftp:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install ssh2-sftp-client @supabase/supabase-js

      - name: Sync Supabase Storage to SFTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
          SFTP_PASSPHRASE: ${{ secrets.SFTP_PASSPHRASE }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node << 'EOF'
          const SftpClient = require('ssh2-sftp-client');

          async function syncToSftp() {
            const sftp = new SftpClient();
            
            try {
              console.log('=== Syncing Supabase Storage to SFTP ===');
              
              // Get list of files from database that haven't been synced yet
              const response = await fetch(
                `${process.env.SUPABASE_URL}/rest/v1/export_files?synced_to_sftp=eq.false&select=*`,
                {
                  headers: {
                    'apikey': process.env.SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${process.env.SUPABASE_ANON_KEY}`
                  }
                }
              );
              
              if (!response.ok) {
                throw new Error(`Failed to fetch export files: ${response.status}`);
              }
              
              const files = await response.json();
              console.log(`Found ${files.length} files to sync`);
              
              if (files.length === 0) {
                console.log('No files to sync');
                return;
              }
              
              // Connect to SFTP
              const connectConfig = {
                host: process.env.SFTP_HOST,
                port: parseInt(process.env.SFTP_PORT),
                username: process.env.SFTP_USERNAME,
                privateKey: Buffer.from(process.env.SFTP_PRIVATE_KEY, 'utf-8'),
                readyTimeout: 30000,
              };
              
              if (process.env.SFTP_PASSPHRASE) {
                connectConfig.passphrase = process.env.SFTP_PASSPHRASE;
              }
              
              console.log('Connecting to SFTP...');
              await sftp.connect(connectConfig);
              console.log('✓ Connected to SFTP');
              
              // Ensure wp-to-modis directory exists
              try {
                await sftp.mkdir('/home/customer/www/developmentplatform.nl/public_html/kosterschoenmode/wp-to-modis', true);
                console.log('✓ Directory ensured: /home/customer/www/developmentplatform.nl/public_html/kosterschoenmode/wp-to-modis');
              } catch (e) {
                console.log('Directory already exists or error:', e.message);
              }
              
              let synced = 0;
              let skipped = 0;
              
              for (const file of files) {
                const remotePath = `/home/customer/www/developmentplatform.nl/public_html/kosterschoenmode/wp-to-modis/${file.filename}`;
                
                try {
                  // Download from Supabase Storage via public URL
                  const publicUrl = `${process.env.SUPABASE_URL}/storage/v1/object/public/order-exports/${file.storage_path}`;
                  console.log(`Downloading ${file.filename} from: ${publicUrl}`);
                  
                  const downloadResponse = await fetch(publicUrl);
                  
                  if (!downloadResponse.ok) {
                    throw new Error(`Download failed: ${downloadResponse.status} ${downloadResponse.statusText}`);
                  }
                  
                  // Get buffer from response
                  const arrayBuffer = await downloadResponse.arrayBuffer();
                  const buffer = Buffer.from(arrayBuffer);
                  
                  // Upload to SFTP
                  await sftp.put(buffer, remotePath);
                  console.log(`✓ Uploaded ${file.filename} to SFTP`);
                  
                  // Mark as synced in database
                  const updateResponse = await fetch(
                    `${process.env.SUPABASE_URL}/rest/v1/export_files?id=eq.${file.id}`,
                    {
                      method: 'PATCH',
                      headers: {
                        'apikey': process.env.SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${process.env.SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                      },
                      body: JSON.stringify({
                        synced_to_sftp: true,
                        synced_at: new Date().toISOString()
                      })
                    }
                  );
                  
                  if (!updateResponse.ok) {
                    console.error(`Failed to mark ${file.filename} as synced`);
                  }
                  
                  synced++;
                  
                } catch (error) {
                  console.error(`Error syncing ${file.filename}:`, error.message);
                }
              }
              
              console.log(`\n=== Sync Complete ===`);
              console.log(`Synced: ${synced}`);
              
            } catch (error) {
              console.error('Sync failed:', error);
              process.exit(1);
            } finally {
              await sftp.end();
            }
          }

          syncToSftp().catch(err => {
            console.error('Fatal error:', err);
            process.exit(1);
          });
          EOF
