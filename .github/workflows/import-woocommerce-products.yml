name: Import WooCommerce Products

on:
  workflow_dispatch: # Manual trigger only

jobs:
  import-products:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install csv-parser node-fetch

      - name: Import Products
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const csv = require('csv-parser');
          const fetch = (...args) => import('node-fetch').then(({default: fetch}) => fetch(...args));

          const BATCH_SIZE = 50;

          // Parse price from Dutch format (e.g., "0199,95" -> 199.95)
          function parsePrice(priceStr) {
            if (!priceStr || priceStr.trim() === '') return null;
            const cleaned = priceStr.replace(/^0+/, '').replace(',', '.');
            const parsed = parseFloat(cleaned);
            return (isNaN(parsed) || parsed === 0) ? null : parsed;
          }

          // Parse attributes from "Naam eigenschap X" and "Waarde eigenschap X" columns
          function parseAttributes(row) {
            const attributes = {};
            for (let i = 1; i <= 22; i++) {
              const name = row[`Naam eigenschap ${i}`];
              const value = row[`Waarde eigenschap ${i}`];
              if (name && name.trim() && value && value.trim()) {
                attributes[name.trim()] = value.trim();
              }
            }
            return attributes;
          }

          // Parse images from row
          function parseImages(row) {
            const images = [];
            const imgField = row['Afbeeldingen'];
            if (imgField && imgField.trim()) {
              // Split by comma and clean
              images.push(...imgField.split(',').map(i => i.trim()).filter(Boolean));
            }
            return images;
          }

          // Make Supabase request
          async function supabaseRequest(endpoint, method, body = null) {
            const options = {
              method,
              headers: {
                'apikey': process.env.SUPABASE_SERVICE_ROLE_KEY,
                'Authorization': `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation'
              }
            };
            if (body) options.body = JSON.stringify(body);

            const response = await fetch(`${process.env.SUPABASE_URL}/rest/v1/${endpoint}`, options);
            
            if (!response.ok) {
              const errorText = await response.text();
              throw new Error(`Supabase error (${response.status}): ${errorText}`);
            }

            return response.status === 204 ? null : await response.json();
          }

          async function main() {
            console.log('🚀 Starting import...');

            // Get tenant ID
            const tenants = await supabaseRequest('tenants?slug=eq.kosterschoenmode&select=id', 'GET');
            if (!tenants || tenants.length === 0) {
              throw new Error('Tenant not found');
            }
            const tenantId = tenants[0].id;
            console.log(`✓ Tenant ID: ${tenantId}`);

            // Get existing products
            const existingProducts = await supabaseRequest(
              `products?tenant_id=eq.${tenantId}&select=sku,id`,
              'GET'
            );
            const existingSkus = new Set(existingProducts.map(p => p.sku));
            console.log(`✓ Found ${existingSkus.size} existing products`);

            // Parse CSV
            const rows = [];
            await new Promise((resolve, reject) => {
              fs.createReadStream('.github/data/woocommerce-products.csv')
                .pipe(csv())
                .on('data', (row) => rows.push(row))
                .on('end', resolve)
                .on('error', reject);
            });
            console.log(`✓ Parsed ${rows.length} CSV rows`);

            // Separate parent products and variants
            const parentRows = rows.filter(r => r.Type === 'variable');
            const variantRows = rows.filter(r => r.Type === 'variation');

            // Filter new parents only
            const newParents = parentRows.filter(r => !existingSkus.has(r['Artikelnummer']));
            console.log(`✓ ${newParents.length} new parent products to import`);

            if (newParents.length === 0) {
              console.log('✅ No new products to import');
              return;
            }

            // PHASE 1: Insert products in batches
            console.log('\n📦 PHASE 1: Inserting products...');
            const skuToProductId = new Map();
            
            for (let i = 0; i < newParents.length; i += BATCH_SIZE) {
              const batch = newParents.slice(i, i + BATCH_SIZE);
              console.log(`Processing products batch ${Math.floor(i / BATCH_SIZE) + 1}/${Math.ceil(newParents.length / BATCH_SIZE)}`);

              const productsToInsert = batch.map(row => ({
                tenant_id: tenantId,
                sku: row['Artikelnummer'],
                title: row['Naam'] || row['Artikelnummer'],
                webshop_text: row['Beschrijving'] || null,
                categories: row['Categorieën'] ? row['Categorieën'].split(', ').map(c => c.trim()).filter(Boolean) : [],
                images: parseImages(row),
                attributes: parseAttributes(row)
              }));

              try {
                const inserted = await supabaseRequest('products', 'POST', productsToInsert);
                
                // Map SKU to product ID
                if (Array.isArray(inserted)) {
                  inserted.forEach(p => skuToProductId.set(p.sku, p.id));
                } else if (inserted && inserted.id) {
                  skuToProductId.set(inserted.sku, inserted.id);
                }
                
                console.log(`✓ Inserted ${batch.length} products`);
              } catch (error) {
                console.error(`❌ Failed to insert products batch:`, error.message);
                throw error;
              }
            }

            console.log(`✓ Total products inserted: ${skuToProductId.size}`);

            // PHASE 2: Insert prices, variants, and stock
            console.log('\n💰 PHASE 2: Inserting prices, variants, and stock...');

            // 2A: Insert prices (always insert, even if both prices are null)
            const pricesToInsert = [];
            for (const row of newParents) {
              const productId = skuToProductId.get(row['Artikelnummer']);
              if (!productId) continue;

              const regularPrice = parsePrice(row['Reguliere prijs']);
              const listPrice = parsePrice(row['Actieprijs']);

              pricesToInsert.push({
                product_id: productId,
                regular: regularPrice,
                list: listPrice,
                currency: 'EUR'
              });
            }

            if (pricesToInsert.length > 0) {
              for (let i = 0; i < pricesToInsert.length; i += BATCH_SIZE) {
                const batch = pricesToInsert.slice(i, i + BATCH_SIZE);
                try {
                  await supabaseRequest('product_prices', 'POST', batch);
                  console.log(`✓ Inserted ${batch.length} prices`);
                } catch (error) {
                  console.error(`❌ Failed to insert prices:`, error.message);
                }
              }
            }

            // 2B: Insert variants (only for new products)
            const variantsToInsert = [];
            const variantRowsForNewProducts = variantRows.filter(v => {
              const parentSku = v['Hoofd'];
              return skuToProductId.has(parentSku);
            });

            console.log(`Found ${variantRowsForNewProducts.length} variants for new products`);

            for (const row of variantRowsForNewProducts) {
              const parentSku = row['Hoofd'];
              const productId = skuToProductId.get(parentSku);
              if (!productId) continue;

              // Extract size from attribute
              const size = row['Waarde eigenschap 1'] || row['Standaardeigenschap 1'] || row['Artikelnummer'];

              variantsToInsert.push({
                product_id: productId,
                maat_id: row['Artikelnummer'],
                size_label: size,
                ean: row['GTIN, UPC, EAN of ISBN'] || null,
                active: row['Op voorraad?'] === '1'
              });
            }

            const skuToVariantId = new Map();
            
            if (variantsToInsert.length > 0) {
              for (let i = 0; i < variantsToInsert.length; i += BATCH_SIZE) {
                const batch = variantsToInsert.slice(i, i + BATCH_SIZE);
                try {
                  const inserted = await supabaseRequest('variants', 'POST', batch);
                  
                  // Map variant maat_id to variant ID
                  if (Array.isArray(inserted)) {
                    inserted.forEach(v => skuToVariantId.set(v.maat_id, v.id));
                  } else if (inserted && inserted.id) {
                    skuToVariantId.set(inserted.maat_id, inserted.id);
                  }
                  
                  console.log(`✓ Inserted ${batch.length} variants`);
                } catch (error) {
                  console.error(`❌ Failed to insert variants:`, error.message);
                }
              }
            }

            // 2C: Insert stock totals
            const stockToInsert = [];
            for (const row of variantRowsForNewProducts) {
              const variantId = skuToVariantId.get(row['Artikelnummer']);
              if (!variantId) continue;

              const stock = parseInt(row['Voorraad']) || 0;
              stockToInsert.push({
                variant_id: variantId,
                qty: stock
              });
            }

            if (stockToInsert.length > 0) {
              for (let i = 0; i < stockToInsert.length; i += BATCH_SIZE) {
                const batch = stockToInsert.slice(i, i + BATCH_SIZE);
                try {
                  await supabaseRequest('stock_totals', 'POST', batch);
                  console.log(`✓ Inserted ${batch.length} stock records`);
                } catch (error) {
                  console.error(`❌ Failed to insert stock:`, error.message);
                }
              }
            }

            console.log('\n✅ Import complete!');
            console.log(`📊 Summary:`);
            console.log(`   - Products: ${skuToProductId.size}`);
            console.log(`   - Prices: ${pricesToInsert.length}`);
            console.log(`   - Variants: ${skuToVariantId.size}`);
            console.log(`   - Stock records: ${stockToInsert.length}`);
          }

          main().catch(error => {
            console.error('❌ Fatal error:', error);
            process.exit(1);
          });
          EOF
