name: SFTP Image Sync

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of images per batch (default 200)'
        required: false
        default: '200'
      start_offset:
        description: 'Skip first N images (for resuming)'
        required: false
        default: '0'

jobs:
  sync-images:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install ssh2-sftp-client node-fetch

      - name: Pre-sync - Normalize image URLs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Normalizing image URL extensions before sync..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${SUPABASE_URL}/functions/v1/normalize-image-urls" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -d '{"tenant":"kosterschoenmode","dryRun":false}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Status: $HTTP_CODE"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Pre-sync normalization returned $HTTP_CODE - continuing anyway"
          fi

      - name: Sync ALL Images from SFTP to Storage
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
          SFTP_PASSPHRASE: ${{ secrets.SFTP_PASSPHRASE }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BATCH_SIZE: ${{ inputs.batch_size || '200' }}
          START_OFFSET: ${{ inputs.start_offset || '0' }}
        run: |
          node << 'SCRIPT'
          const SftpClient = require('ssh2-sftp-client');
          const fetch = (...args) => import('node-fetch').then(({default: f}) => f(...args));

          const BATCH_SIZE = parseInt(process.env.BATCH_SIZE) || 200;
          const START_OFFSET = parseInt(process.env.START_OFFSET) || 0;

          async function syncImages() {
            const sftp = new SftpClient();

            try {
              console.log('=== SFTP Image Sync (Full Directory) ===');
              console.log(`Batch size: ${BATCH_SIZE}, Start offset: ${START_OFFSET}`);

              // Step 1: Fix image URLs in database (normalize paths)
              console.log('\nStep 1: Fixing image URLs in database...');
              try {
                const fixResponse = await fetch(
                  `${process.env.SUPABASE_URL}/functions/v1/fix-image-urls`,
                  {
                    method: 'POST',
                    headers: {
                      'Content-Type': 'application/json',
                      'Authorization': `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}`,
                    },
                    body: JSON.stringify({}),
                  }
                );
                if (fixResponse.ok) {
                  const fixResult = await fixResponse.json();
                  console.log(`✓ Fixed ${fixResult.fixedProducts || 0} products`);
                } else {
                  console.warn('⚠ Fix image URLs returned:', fixResponse.status);
                }
              } catch (e) {
                console.warn('⚠ Fix image URLs failed (continuing):', e.message);
              }

              // Step 2: Get list of existing files in Storage bucket
              console.log('\nStep 2: Getting existing images in Storage...');
              const existingImages = new Set();
              let offset = 0;
              const limit = 1000;

              while (true) {
                const listResponse = await fetch(
                  `${process.env.SUPABASE_URL}/storage/v1/object/list/product-images`,
                  {
                    method: 'POST',
                    headers: {
                      'Content-Type': 'application/json',
                      'apikey': process.env.SUPABASE_SERVICE_ROLE_KEY,
                      'Authorization': `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}`,
                    },
                    body: JSON.stringify({ limit, offset, prefix: '' }),
                  }
                );

                if (!listResponse.ok) {
                  console.warn('⚠ Storage list failed at offset', offset);
                  break;
                }
                const files = await listResponse.json();
                if (!files || files.length === 0) break;
                files.forEach(f => { if (f.name) existingImages.add(f.name); });
                if (files.length < limit) break;
                offset += limit;
              }

              console.log(`Found ${existingImages.size} existing images in Storage`);

              // Step 3: Connect to SFTP and list ALL files in webfoto
              console.log('\nStep 3: Connecting to SFTP and listing webfoto...');
              await sftp.connect({
                host: process.env.SFTP_HOST,
                port: parseInt(process.env.SFTP_PORT),
                username: process.env.SFTP_USERNAME,
                privateKey: Buffer.from(process.env.SFTP_PRIVATE_KEY, 'utf-8'),
                passphrase: process.env.SFTP_PASSPHRASE || undefined,
                readyTimeout: 30000,
              });
              console.log('✓ Connected to SFTP');

              const basePath = '/home/customer/www/modisbridge.nl/public_html/kosterschoenmode';
              const possiblePaths = [
                `${basePath}/webfoto`,
                `${basePath}/Webfoto`,
              ];

              let webfotoPath = null;
              for (const path of possiblePaths) {
                const exists = await sftp.exists(path);
                if (exists) {
                  webfotoPath = path;
                  console.log(`✓ Found webfoto at: ${path}`);
                  break;
                }
              }

              if (!webfotoPath) {
                console.error('✗ Webfoto directory not found!');
                await sftp.end();
                return;
              }

              // List all files in the directory
              const allFiles = await sftp.list(webfotoPath);
              const imageFiles = allFiles
                .filter(f => f.type === '-' && /\.(jpe?g|png|gif|webp|bmp|tiff?)$/i.test(f.name))
                .map(f => f.name)
                .sort();

              console.log(`Found ${imageFiles.length} image files on SFTP`);

              // Filter out already existing
              const missingImages = imageFiles.filter(name => !existingImages.has(name));
              console.log(`Missing in Storage: ${missingImages.length}`);
              console.log(`Already in Storage: ${imageFiles.length - missingImages.length}`);

              if (missingImages.length === 0) {
                console.log('✓ All images are already in Storage!');
                await sftp.end();
                return;
              }

              // Apply offset for resuming
              const toProcess = missingImages.slice(START_OFFSET);
              console.log(`\nStep 4: Uploading ${toProcess.length} images (offset: ${START_OFFSET})...`);

              let uploaded = 0;
              let notFound = 0;
              let errors = 0;
              let skipped = 0;

              const MAX_RETRIES = 3;
              const failedImages = [];

              async function uploadWithRetry(imageName, attempt = 1) {
                try {
                  const imagePath = `${webfotoPath}/${imageName}`;
                  const imageBuffer = await sftp.get(imagePath);

                  // Skip files > 50MB to avoid 413 errors
                  if (imageBuffer.length > 50 * 1024 * 1024) {
                    console.warn(`⚠ Skipping ${imageName}: too large (${(imageBuffer.length / 1024 / 1024).toFixed(1)}MB)`);
                    skipped++;
                    return;
                  }

                  const uploadResponse = await fetch(
                    `${process.env.SUPABASE_URL}/storage/v1/object/product-images/${encodeURIComponent(imageName)}`,
                    {
                      method: 'POST',
                      headers: {
                        'Authorization': `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}`,
                        'Content-Type': 'image/jpeg',
                        'x-upsert': 'false',
                      },
                      body: imageBuffer,
                    }
                  );

                  if (uploadResponse.ok) {
                    uploaded++;
                    return;
                  }

                  if (uploadResponse.status === 409) {
                    skipped++; // already exists — not an error
                    return;
                  }

                  if (uploadResponse.status === 413) {
                    console.warn(`⚠ Skipping ${imageName}: payload too large (413)`);
                    skipped++;
                    return;
                  }

                  // Retryable error
                  const errText = await uploadResponse.text();
                  if (attempt < MAX_RETRIES) {
                    const delay = Math.min(1000 * Math.pow(2, attempt - 1), 8000);
                    console.warn(`⚠ Retry ${attempt}/${MAX_RETRIES} for ${imageName} in ${delay}ms (${uploadResponse.status})`);
                    await new Promise(r => setTimeout(r, delay));
                    return uploadWithRetry(imageName, attempt + 1);
                  }

                  errors++;
                  failedImages.push({ name: imageName, status: uploadResponse.status, error: errText.slice(0, 100) });
                  if (errors <= 20) console.error(`✗ Upload failed ${imageName} after ${MAX_RETRIES} attempts: ${uploadResponse.status}`);
                } catch (error) {
                  if (attempt < MAX_RETRIES) {
                    const delay = Math.min(1000 * Math.pow(2, attempt - 1), 8000);
                    console.warn(`⚠ Retry ${attempt}/${MAX_RETRIES} for ${imageName} in ${delay}ms (${error.message})`);
                    await new Promise(r => setTimeout(r, delay));
                    return uploadWithRetry(imageName, attempt + 1);
                  }
                  errors++;
                  failedImages.push({ name: imageName, status: 0, error: error.message.slice(0, 100) });
                  if (errors <= 20) console.error(`✗ Error ${imageName} after ${MAX_RETRIES} attempts: ${error.message}`);
                }
              }

              // Process in batches
              const UPLOAD_BATCH = 10;
              for (let i = 0; i < toProcess.length; i += UPLOAD_BATCH) {
                const batch = toProcess.slice(i, i + UPLOAD_BATCH);
                await Promise.all(batch.map(name => uploadWithRetry(name)));

                // Progress every batch
                const done = Math.min(i + UPLOAD_BATCH, toProcess.length);
                if (done % 50 === 0 || done === toProcess.length) {
                  console.log(`Progress: ${done}/${toProcess.length} (uploaded: ${uploaded}, skipped: ${skipped}, errors: ${errors})`);
                }
              }

              console.log(`\n=== Final Results ===`);
              console.log(`Total on SFTP: ${imageFiles.length}`);
              console.log(`Already in Storage: ${imageFiles.length - missingImages.length}`);
              console.log(`Uploaded: ${uploaded}`);
              console.log(`Skipped (409/413/large): ${skipped}`);
              console.log(`Errors (after ${MAX_RETRIES} retries): ${errors}`);

              if (failedImages.length > 0) {
                console.log(`\n=== Failed Images (${failedImages.length}) ===`);
                failedImages.slice(0, 30).forEach(f => {
                  console.log(`  ${f.name} — status: ${f.status}, error: ${f.error}`);
                });
                if (failedImages.length > 30) console.log(`  ... and ${failedImages.length - 30} more`);
              }

              await sftp.end();

              // Step 5: Update product image paths to full storage URLs
              console.log('\nStep 5: Updating product image paths...');
              try {
                const fixResponse2 = await fetch(
                  `${process.env.SUPABASE_URL}/functions/v1/fix-image-urls`,
                  {
                    method: 'POST',
                    headers: {
                      'Content-Type': 'application/json',
                      'Authorization': `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}`,
                    },
                    body: JSON.stringify({}),
                  }
                );
                if (fixResponse2.ok) {
                  const result = await fixResponse2.json();
                  console.log(`✓ Updated ${result.fixedProducts || 0} product image paths`);
                }
              } catch (e) {
                console.warn('⚠ Post-fix failed:', e.message);
              }

              console.log('\n✓ Image sync complete');

            } catch (error) {
              console.error('Fatal error:', error);
              try { await sftp.end(); } catch(e) {}
              throw error;
            }
          }

          syncImages().catch(err => {
            console.error('Sync failed:', err);
            process.exit(1);
          });
          SCRIPT
