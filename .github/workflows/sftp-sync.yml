name: SFTP to Supabase Sync v2

on:
  schedule:
    # Runs every 2 minutes
    - cron: '*/2 * * * *'
  workflow_dispatch: # Allow manual trigger via Actions tab

jobs:
  sync-sftp:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SSH client
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Install dependencies
        run: |
          npm init -y
          npm install ssh2-sftp-client node-fetch

      - name: Debug and Sync SFTP files
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
          SFTP_PASSPHRASE: ${{ secrets.SFTP_PASSPHRASE }}
          SFTP_INBOUND_PATH: ${{ secrets.SFTP_INBOUND_PATH }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node << 'EOF'
          const SftpClient = require('ssh2-sftp-client');
          const fetch = (...args) => import('node-fetch').then(({default: fetch}) => fetch(...args));
          const fs = require('fs').promises;

          async function syncSftp() {
            const sftp = new SftpClient();
            
            try {
              console.log('=== SFTP DEBUG INFO ===');
              console.log('Passphrase provided:', process.env.SFTP_PASSPHRASE ? 'YES' : 'NO');
              console.log('Host:', process.env.SFTP_HOST);
              console.log('Port:', process.env.SFTP_PORT);
              console.log('Username:', process.env.SFTP_USERNAME);
              console.log('Inbound path configured:', process.env.SFTP_INBOUND_PATH);
              console.log('======================');
              
              const connectConfig = {
                host: process.env.SFTP_HOST,
                port: parseInt(process.env.SFTP_PORT),
                username: process.env.SFTP_USERNAME,
                privateKey: Buffer.from(process.env.SFTP_PRIVATE_KEY, 'utf-8'),
                readyTimeout: 30000,
              };
              
              if (process.env.SFTP_PASSPHRASE) {
                connectConfig.passphrase = process.env.SFTP_PASSPHRASE;
              }
              
              console.log('Connecting to SFTP...');
              await sftp.connect(connectConfig);
              console.log('✓ Connected to SFTP');
              
              // Check current directory
              const cwd = await sftp.cwd();
              console.log('Current working directory:', cwd);
              
              // List root to see what's available
              console.log('\n=== Listing root directory ===');
              try {
                const rootFiles = await sftp.list('.');
                console.log('Root contents:', rootFiles.map(f => `${f.name} (${f.type})`).join(', '));
              } catch (e) {
                console.log('Could not list root:', e.message);
              }
              
              // Build paths
              const basePath = process.env.SFTP_INBOUND_PATH;
              const readyPath = `${basePath}/ready`;
              const processingPath = `${basePath}/processing`;
              const archivePath = `${basePath}/archive`;
              const errorPath = `${basePath}/error`;
              
              console.log('\n=== Checking configured paths ===');
              console.log('Ready path:', readyPath);
              console.log('Processing path:', processingPath);
              console.log('Archive path:', archivePath);
              console.log('Error path:', errorPath);
              
              // Check if base path exists
              console.log('\n=== Verifying base path exists ===');
              try {
                const baseExists = await sftp.exists(basePath);
                console.log(`Base path "${basePath}" exists:`, baseExists);
                
                if (baseExists) {
                  const baseContents = await sftp.list(basePath);
                  console.log('Base path contents:', baseContents.map(f => `${f.name} (${f.type})`).join(', '));
                }
              } catch (e) {
                console.error('Error checking base path:', e.message);
              }
              
              // Ensure directories exist
              console.log('\n=== Creating directories if needed ===');
              for (const dir of [readyPath, processingPath, archivePath, errorPath]) {
                try {
                  await sftp.mkdir(dir, true);
                  console.log(`✓ Directory ensured: ${dir}`);
                } catch (e) {
                  console.log(`Directory already exists or error: ${dir} - ${e.message}`);
                }
              }
              
              // List XML files in ready directory
              console.log('\n=== Scanning for XML files ===');
              console.log('Scanning path:', readyPath);
              
              const files = await sftp.list(readyPath);
              console.log(`Found ${files.length} total files/folders in ready directory`);
              
              if (files.length > 0) {
                console.log('All items:', files.map(f => `${f.name} (type: ${f.type}, size: ${f.size})`).join('\n'));
              }
              
              const xmlFiles = files.filter(f => {
                const isXml = f.name.toLowerCase().endsWith('.xml');
                const isFile = f.type === '-';
                console.log(`Checking: ${f.name} - isXML: ${isXml}, isFile: ${isFile}`);
                return isXml && isFile;
              });
              
              console.log(`Found ${xmlFiles.length} XML files`);
              
              // Sync photos from webfoto directory (at tenant level, not inside modis-to-wp)
              console.log('\n=== Syncing product photos ===');
              
              // Extract tenant path from basePath by removing /modis-to-wp
              const tenantBasePath = basePath.replace('/modis-to-wp', '');
              const webfotoPath = `${tenantBasePath}/webfoto`;
              
              try {
                const webfotoExists = await sftp.exists(webfotoPath);
                console.log(`Webfoto path "${webfotoPath}" exists:`, webfotoExists);
                
                if (webfotoExists) {
                  const photoFiles = await sftp.list(webfotoPath);
                  const imageFiles = photoFiles.filter(f => {
                    const isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(f.name);
                    const isFile = f.type === '-';
                    return isImage && isFile;
                  });
                  
                  console.log(`Found ${imageFiles.length} image files to sync`);
                  
                  for (const photoFile of imageFiles) {
                    try {
                      const photoPath = `${webfotoPath}/${photoFile.name}`;
                      const imageBuffer = await sftp.get(photoPath);
                      
                      // Upload to Supabase Storage
                      const uploadResponse = await fetch(
                        `${process.env.SUPABASE_URL}/storage/v1/object/product-images/${photoFile.name}`,
                        {
                          method: 'POST',
                          headers: {
                            'Authorization': `Bearer ${process.env.SUPABASE_ANON_KEY}`,
                            'Content-Type': 'image/jpeg',
                          },
                          body: imageBuffer,
                        }
                      );
                      
                      if (uploadResponse.ok) {
                        console.log(`✓ Uploaded photo: ${photoFile.name}`);
                      } else {
                        // Check if file already exists (409 conflict)
                        if (uploadResponse.status === 409) {
                          console.log(`Photo already exists: ${photoFile.name}`);
                        } else {
                          console.error(`Failed to upload ${photoFile.name}: ${uploadResponse.status}`);
                        }
                      }
                    } catch (photoError) {
                      console.error(`Error uploading photo ${photoFile.name}:`, photoError.message);
                    }
                  }
                }
              } catch (e) {
                console.error('Error syncing photos:', e.message);
              }
              
              console.log('\n=== Processing XML files ===');
              
              for (const file of xmlFiles) {
                const fileName = file.name;
                const readyFilePath = `${readyPath}/${fileName}`;
                const processingFilePath = `${processingPath}/${fileName}`;
                const archiveFilePath = `${archivePath}/${fileName}`;
                const errorFilePath = `${errorPath}/${fileName}`;
                
                try {
                  console.log(`Processing: ${fileName}`);
                  
                  // Move to processing
                  await sftp.rename(readyFilePath, processingFilePath);
                  
                  // Download file content
                  const xmlContent = await sftp.get(processingFilePath);
                  const xmlString = xmlContent.toString('utf-8');
                  
                  // Call Supabase edge function
                  const response = await fetch(
                    `${process.env.SUPABASE_URL}/functions/v1/process-articles`,
                    {
                      method: 'POST',
                      headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${process.env.SUPABASE_ANON_KEY}`,
                      },
                      body: JSON.stringify({
                        fileName: fileName,
                        xmlContent: xmlString,
                      }),
                    }
                  );
                  
                  if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Edge function failed: ${response.status} ${errorText}`);
                  }
                  
                  const result = await response.json();
                  console.log(`Success: ${fileName} - ${result.message}`);
                  
                  // Move to archive
                  await sftp.rename(processingFilePath, archiveFilePath);
                  
                } catch (error) {
                  console.error(`Error processing ${fileName}:`, error.message);
                  
                  // Move to error directory
                  try {
                    await sftp.rename(processingFilePath, errorFilePath);
                  } catch (moveError) {
                    console.error(`Failed to move to error dir:`, moveError.message);
                  }
                }
              }
              
              console.log('SFTP sync completed');
              
            } catch (error) {
              console.error('SFTP sync failed:', error);
              process.exit(1);
            } finally {
              await sftp.end();
            }
          }

          syncSftp().catch(err => {
            console.error('Fatal error:', err);
            process.exit(1);
          });
          EOF
