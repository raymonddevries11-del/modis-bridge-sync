name: SFTP to Supabase Sync v2

on:
  schedule:
    # Runs every 2 minutes
    - cron: '*/2 * * * *'
  workflow_dispatch: # Allow manual trigger via Actions tab

jobs:
  sync-sftp:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SSH client
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Install dependencies
        run: |
          npm init -y
          npm install ssh2-sftp-client node-fetch

      - name: Debug and Sync SFTP files
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
          SFTP_PASSPHRASE: ${{ secrets.SFTP_PASSPHRASE }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node << 'EOF'
          const SftpClient = require('ssh2-sftp-client');
          const fetch = (...args) => import('node-fetch').then(({default: fetch}) => fetch(...args));
          const fs = require('fs').promises;

          async function syncSftp() {
            const sftp = new SftpClient();
            
            try {
              console.log('=== SFTP Multi-Tenant Sync ===');
              console.log('Fetching tenant configurations from Supabase...');
              
              // Get all active tenants with their SFTP configurations
              const tenantsResponse = await fetch(
                `${process.env.SUPABASE_URL}/rest/v1/tenants?active=eq.true&select=id,name,slug`,
                {
                  headers: {
                    'apikey': process.env.SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${process.env.SUPABASE_ANON_KEY}`
                  }
                }
              );
              
              if (!tenantsResponse.ok) {
                throw new Error(`Failed to fetch tenants: ${tenantsResponse.status}`);
              }
              
              const tenants = await tenantsResponse.json();
              console.log(`Found ${tenants.length} active tenants`);
              
              if (tenants.length === 0) {
                console.log('No active tenants to sync');
                return;
              }
              
              // Get tenant configs separately
              const configsResponse = await fetch(
                `${process.env.SUPABASE_URL}/rest/v1/tenant_config?select=*`,
                {
                  headers: {
                    'apikey': process.env.SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${process.env.SUPABASE_ANON_KEY}`
                  }
                }
              );
              
              if (!configsResponse.ok) {
                throw new Error(`Failed to fetch tenant configs: ${configsResponse.status}`);
              }
              
              const configs = await configsResponse.json();
              
              // Map configs to tenants
              const configMap = {};
              for (const config of configs) {
                configMap[config.tenant_id] = config;
              }
              
              if (tenants.length === 0) {
                console.log('No active tenants to sync');
                return;
              }
              
              // Connect to SFTP once
              const connectConfig = {
                host: process.env.SFTP_HOST,
                port: parseInt(process.env.SFTP_PORT),
                username: process.env.SFTP_USERNAME,
                privateKey: Buffer.from(process.env.SFTP_PRIVATE_KEY, 'utf-8'),
                readyTimeout: 30000,
              };
              
              if (process.env.SFTP_PASSPHRASE) {
                connectConfig.passphrase = process.env.SFTP_PASSPHRASE;
              }
              
              console.log('Connecting to SFTP...');
              await sftp.connect(connectConfig);
              console.log('✓ Connected to SFTP');
              
              // Process each tenant
              for (const tenant of tenants) {
                const tenantConfig = configMap[tenant.id];
                
                if (!tenantConfig || !tenantConfig.sftp_inbound_path) {
                  console.log(`⚠ Skipping ${tenant.name} - no SFTP config found`);
                  continue;
                }
                
                console.log(`\n=== Processing tenant: ${tenant.name} (${tenant.slug}) ===`);
                
                const basePath = tenantConfig.sftp_inbound_path;
              const readyPath = basePath; // Scan directly in the base path
              const processingPath = `${basePath}/processing`;
              const archivePath = `${basePath}/archive`;
              const errorPath = `${basePath}/error`;
              
              console.log('\n=== Checking configured paths ===');
              console.log('Ready path:', readyPath);
              console.log('Processing path:', processingPath);
              console.log('Archive path:', archivePath);
              console.log('Error path:', errorPath);
              
              // Check if base path exists
              console.log('\n=== Verifying base path exists ===');
              try {
                const baseExists = await sftp.exists(basePath);
                console.log(`Base path "${basePath}" exists:`, baseExists);
                
                if (baseExists) {
                  const baseContents = await sftp.list(basePath);
                  console.log('Base path contents:', baseContents.map(f => `${f.name} (${f.type})`).join(', '));
                }
              } catch (e) {
                console.error('Error checking base path:', e.message);
              }
              
              // Ensure directories exist
              console.log('\n=== Creating directories if needed ===');
              for (const dir of [readyPath, processingPath, archivePath, errorPath]) {
                try {
                  await sftp.mkdir(dir, true);
                  console.log(`✓ Directory ensured: ${dir}`);
                } catch (e) {
                  console.log(`Directory already exists or error: ${dir} - ${e.message}`);
                }
              }
              
              // List XML files in ready directory
              console.log('\n=== Scanning for XML files ===');
              console.log('Scanning path:', readyPath);
              
              const files = await sftp.list(readyPath);
              console.log(`Found ${files.length} total files/folders in ready directory`);
              
              if (files.length > 0) {
                console.log('All items:', files.map(f => `${f.name} (type: ${f.type}, size: ${f.size})`).join('\n'));
              }
              
              // Separate artikel and voorraad files
              const artikelFiles = files.filter(f => {
                const isXml = f.name.toLowerCase().endsWith('.xml');
                const isFile = f.type === '-';
                const isArtikel = f.name.toLowerCase().includes('artikel');
                return isXml && isFile && isArtikel;
              });
              
              const voorraadFiles = files.filter(f => {
                const isXml = f.name.toLowerCase().endsWith('.xml');
                const isFile = f.type === '-';
                const isVoorraad = f.name.toLowerCase().includes('voorraad');
                return isXml && isFile && isVoorraad;
              });
              
              console.log(`Found ${artikelFiles.length} artikel files and ${voorraadFiles.length} voorraad files`);
              
              const xmlFiles = [...artikelFiles, ...voorraadFiles];
              
              // Extract SKUs from artikel files only for photo sync
              const skusToSync = new Set();
              
              if (artikelFiles.length > 0) {
                console.log('\n=== Extracting SKUs from artikel files ===');
                for (const xmlFile of artikelFiles) {
                  try {
                    const xmlPath = `${basePath}/${xmlFile.name}`;
                    const xmlContent = await sftp.get(xmlPath);
                    const xmlString = xmlContent.toString('utf-8');
                    
                    // Extract SKUs from XML (looking for patterns like <ArtikelNummer> or similar)
                    const skuMatches = xmlString.match(/<ArtikelNummer[^>]*>([^<]+)<\/ArtikelNummer>/gi);
                    if (skuMatches) {
                      skuMatches.forEach(match => {
                        const sku = match.replace(/<[^>]+>/g, '').trim();
                        if (sku) {
                          skusToSync.add(sku);
                        }
                      });
                    }
                  } catch (error) {
                    console.error(`Error reading XML ${xmlFile.name}:`, error.message);
                  }
                }
                console.log(`Found ${skusToSync.size} unique SKUs in artikel files`);
                if (skusToSync.size > 0) {
                  console.log('Sample SKUs:', Array.from(skusToSync).slice(0, 5).join(', '));
                }
              }
              
              // Sync photos from webfoto directory (at tenant level, not inside modis-to-wp)
              console.log('\n=== Syncing product photos ===');
              
              // Extract tenant path from basePath by removing /modis-to-wp
              const tenantBasePath = basePath.replace('/modis-to-wp', '');
              const webfotoPath = `${tenantBasePath}/webfoto`;
              
              try {
                const webfotoExists = await sftp.exists(webfotoPath);
                console.log(`Webfoto path "${webfotoPath}" exists:`, webfotoExists);
                
                if (webfotoExists) {
                  const photoFiles = await sftp.list(webfotoPath);
                  let imageFiles = photoFiles.filter(f => {
                    const isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(f.name);
                    const isFile = f.type === '-';
                    return isImage && isFile;
                  });
                  
                  // If we have SKUs from XML, filter images to only those matching SKUs
                  if (skusToSync.size > 0) {
                    console.log('Filtering images by SKUs...');
                    console.log('Sample image names:', imageFiles.slice(0, 5).map(f => f.name).join(', '));
                    
                    imageFiles = imageFiles.filter(f => {
                      // Extract SKU from filename after underscore (e.g., W-1_101069102.JPG -> 101069102)
                      const nameWithoutExt = f.name.replace(/\.(jpg|jpeg|png|gif|webp)$/i, '');
                      const underscoreIndex = nameWithoutExt.lastIndexOf('_');
                      if (underscoreIndex === -1) return false;
                      
                      const skuFromFilename = nameWithoutExt.substring(underscoreIndex + 1);
                      
                      // Check if SKU from filename starts with any of the artikel SKUs
                      const match = Array.from(skusToSync).some(sku => {
                        return sku.startsWith(skuFromFilename) || skuFromFilename.startsWith(sku);
                      });
                      
                      if (match) {
                        console.log(`✓ Match found: ${f.name} matches SKU pattern`);
                      }
                      return match;
                    });
                    console.log(`Found ${imageFiles.length} image files matching XML SKUs (from ${photoFiles.length} total)`);
                  } else {
                    console.log(`Found ${imageFiles.length} image files to sync (no SKU filtering)`);
                  }
                  
                  for (const photoFile of imageFiles) {
                    try {
                      const photoPath = `${webfotoPath}/${photoFile.name}`;
                      
                      // Check if photo already exists in Supabase Storage
                      // List all files in the bucket root directory
                      const listResponse = await fetch(
                        `${process.env.SUPABASE_URL}/storage/v1/object/list/product-images`,
                        {
                          method: 'POST',
                          headers: {
                            'Authorization': `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}`,
                            'Content-Type': 'application/json',
                          },
                          body: JSON.stringify({
                            limit: 10000,
                            offset: 0,
                            sortBy: { column: 'name', order: 'asc' },
                          }),
                        }
                      );
                      
                      // Skip if photo already exists
                      if (listResponse.ok) {
                        const files = await listResponse.json();
                        const fileExists = Array.isArray(files) && files.some(f => f.name === photoFile.name);
                        if (fileExists) {
                          console.log(`⊘ Skipped (already exists): ${photoFile.name}`);
                          continue;
                        }
                        console.log(`✓ Photo doesn't exist yet, uploading: ${photoFile.name}`);
                      } else {
                        console.log(`⚠ Could not check existence for ${photoFile.name}, proceeding with upload`);
                      }
                      
                      // Photo doesn't exist (404), proceed with upload
                      const imageBuffer = await sftp.get(photoPath);
                      
                      const uploadResponse = await fetch(
                        `${process.env.SUPABASE_URL}/storage/v1/object/product-images/${photoFile.name}`,
                        {
                          method: 'POST',
                          headers: {
                            'Authorization': `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}`,
                            'Content-Type': 'image/jpeg',
                          },
                          body: imageBuffer,
                        }
                      );
                      
                      if (uploadResponse.ok) {
                        console.log(`✓ Uploaded photo: ${photoFile.name}`);
                      } else {
                        const errorText = await uploadResponse.text();
                        console.error(`Failed to upload ${photoFile.name}: ${uploadResponse.status} - ${errorText}`);
                      }
                    } catch (photoError) {
                      console.error(`Error processing photo ${photoFile.name}:`, photoError.message);
                    }
                  }
                }
              } catch (e) {
                console.error('Error syncing photos:', e.message);
              }
              
              console.log('\n=== Processing XML files ===');
              
              for (const file of xmlFiles) {
                const fileName = file.name;
                const readyFilePath = `${readyPath}/${fileName}`;
                const processingFilePath = `${processingPath}/${fileName}`;
                const archiveFilePath = `${archivePath}/${fileName}`;
                const errorFilePath = `${errorPath}/${fileName}`;
                
                try {
                  console.log(`Processing: ${fileName}`);
                  
                  // Move to processing
                  await sftp.rename(readyFilePath, processingFilePath);
                  
                  // Download file content
                  const xmlContent = await sftp.get(processingFilePath);
                  const xmlString = xmlContent.toString('utf-8');
                  
                  // Determine which edge function to call based on file type
                  const isVoorraadFile = fileName.toLowerCase().includes('voorraad');
                  const edgeFunction = isVoorraadFile ? 'process-stock' : 'process-articles';
                  
                  console.log(`Calling edge function: ${edgeFunction}`);
                  
                  // Call Supabase edge function
                  const response = await fetch(
                    `${process.env.SUPABASE_URL}/functions/v1/${edgeFunction}`,
                    {
                      method: 'POST',
                      headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${process.env.SUPABASE_ANON_KEY}`,
                      },
                      body: JSON.stringify({
                        fileName: fileName,
                        xmlContent: xmlString,
                        tenantId: tenant.id,
                      }),
                    }
                  );
                  
                  if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Edge function failed: ${response.status} ${errorText}`);
                  }
                  
                  const result = await response.json();
                  console.log(`Success: ${fileName} - ${result.message}`);
                  
                  // Log to changelog
                  try {
                    await fetch(
                      `${process.env.SUPABASE_URL}/rest/v1/changelog`,
                      {
                        method: 'POST',
                        headers: {
                          'apikey': process.env.SUPABASE_ANON_KEY,
                          'Authorization': `Bearer ${process.env.SUPABASE_ANON_KEY}`,
                          'Content-Type': 'application/json',
                          'Prefer': 'return=minimal'
                        },
                        body: JSON.stringify({
                          tenant_id: tenant.id,
                          event_type: 'SFTP_SYNC',
                          description: `XML bestand ${fileName} verwerkt via SFTP`,
                          metadata: { filename: fileName, tenant_name: tenant.name }
                        })
                      }
                    );
                  } catch (logError) {
                    console.error('Failed to log to changelog:', logError.message);
                  }
                  
                  // Move to archive
                  await sftp.rename(processingFilePath, archiveFilePath);
                  
                } catch (error) {
                  console.error(`Error processing ${fileName}:`, error.message);
                  
                  // Move to error directory
                  try {
                    await sftp.rename(processingFilePath, errorFilePath);
                  } catch (moveError) {
                    console.error(`Failed to move to error dir:`, moveError.message);
                  }
                }
              }
              
              console.log(`\n=== Finished processing tenant: ${tenant.name} ===`);
            }
              
              console.log('\n=== All tenants synced ===');
              
            } catch (error) {
              console.error('SFTP sync failed:', error);
              process.exit(1);
            } finally {
              await sftp.end();
            }
          }

          syncSftp().catch(err => {
            console.error('Fatal error:', err);
            process.exit(1);
          });
          EOF
