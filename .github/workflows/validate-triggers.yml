name: Validate Trigger Guardrails

on:
  push:
    paths:
      - 'supabase/migrations/**'
  pull_request:
    paths:
      - 'supabase/migrations/**'

jobs:
  validate-triggers:
    name: Check for duplicate triggers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Step 1: Static analysis — only scan NEW migration files in this push/PR
      - name: Static scan for new trigger creation
        run: |
          echo "🔍 Scanning only NEW migration files for trigger patterns..."
          
          # Get list of changed files in this push/PR
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD -- 'supabase/migrations/*.sql' 2>/dev/null || echo "")
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'supabase/migrations/*.sql' 2>/dev/null || echo "")
          fi
          
          if [ -z "$CHANGED" ]; then
            echo "✅ No new migration files to scan"
            exit 0
          fi
          
          VIOLATIONS=0
          
          for f in $CHANGED; do
            [ -f "$f" ] || continue
            
            # Check if file creates a trigger that writes to jobs
            if grep -qi "CREATE TRIGGER" "$f" && grep -qi "INSERT INTO jobs" "$f"; then
              TRIGGER=$(grep -oi "CREATE TRIGGER \w\+" "$f" | head -1 | sed 's/CREATE TRIGGER //i')
              echo "⚠️  New migration $f creates trigger '$TRIGGER' that writes to jobs"
              
              # Check if trigger function lacks idempotent insert
              if ! grep -qi "unique_violation\|ON CONFLICT" "$f"; then
                echo "❌ Missing idempotent insert (ON CONFLICT / unique_violation)"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            fi
          done
          
          if [ $VIOLATIONS -gt 0 ]; then
            echo ""
            echo "❌ Found $VIOLATIONS trigger guardrail violation(s) in new migrations"
            echo "   See docs/triggers-audit.md for guidelines"
            exit 1
          fi
          
          echo "✅ No trigger conflicts detected in new migration files"

      # Step 2: Runtime validation — call the DB function post-migration
      - name: Validate triggers in database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "⚠️  Skipping runtime validation — SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY not set"
            exit 0
          fi
          
          echo "🔍 Running runtime trigger validation..."
          
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "${SUPABASE_URL}/rest/v1/rpc/validate_no_duplicate_triggers" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Failed to run trigger validation (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi
          
          # Check if any violations returned
          VIOLATION_COUNT=$(echo "$BODY" | python3 -c "import sys,json; data=json.load(sys.stdin); print(len(data))" 2>/dev/null || echo "0")
          
          if [ "$VIOLATION_COUNT" -gt 0 ]; then
            echo "❌ TRIGGER GUARDRAIL FAILED: $VIOLATION_COUNT violation(s) found:"
            echo "$BODY" | python3 -c "
          import sys, json
          for v in json.load(sys.stdin):
              print(f\"  • {v['violation_type']} on {v['table_name']}: {', '.join(v['trigger_names'])}\")
          " 2>/dev/null || echo "$BODY"
            exit 1
          fi
          
          echo "✅ Runtime trigger validation passed — no duplicate triggers in database"
